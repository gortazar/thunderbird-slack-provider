<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Slack-inspired hash/hashtag mark in brand colours -->
  <rect width="16" height="16" rx="3" fill="#4A154B"/>
  <!-- horizontal bars -->
  <rect x="3" y="5" width="10" height="1.5" rx="0.75" fill="#FFFFFF"/>
  <rect x="3" y="9.5" width="10" height="1.5" rx="0.75" fill="#FFFFFF"/>
  <!-- vertical bars -->
  <rect x="5.5" y="3" width="1.5" height="10" rx="0.75" fill="#FFFFFF"/>
  <rect x="9" y="3" width="1.5" height="10" rx="0.75" fill="#FFFFFF"/>
</svg>
